<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk & Daftar | NexMart</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-dark); /* Ensure dark background */
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.2), transparent),
                        radial-gradient(circle at bottom left, rgba(0, 242, 255, 0.1), transparent);
            color: white;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            background: #1e293b; /* Solid Dark Background */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 5px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 600;
            color: #94a3b8;
        }
        .auth-tab.active {
            background: var(--primary);
            color: #0f172a;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #cbd5e1; /* Lighter label for better visibility */
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
        .form-group select {
            appearance: none;
            cursor: pointer;
        }
        .social-login {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }
        .social-btn:hover {
            background: var(--primary);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="auth-card glass animate-fade">
        <a href="index.html" class="logo gradient-text" style="font-size: 2.5rem; display: block; margin-bottom: 30px;">NexMart</a>
        
        <div class="auth-tabs">
            <div class="auth-tab active" id="login-tab" onclick="switchTab('login')">Masuk</div>
            <div class="auth-tab" id="register-tab" onclick="switchTab('register')">Daftar</div>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label>Email atau Username</label>
                <input type="text" id="loginUser" placeholder="Masukkan email Anda">
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" style="color: var(--primary); font-size: 0.85rem; text-decoration: none;">Lupa kata sandi?</a>
            </div>
            <button onclick="handleLogin()" class="btn btn-primary" style="width: 100%; justify-content: center;">Masuk Sekarang</button>
        </div>

        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Nama sesuai KTP">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="contoh: imam@mail.com">
            </div>
            <div class="form-group">
                <label>Kata Sandi Baru</label>
                <input type="password" id="regPass" placeholder="Minimal 5 karakter">
            </div>
            <button onclick="handleRegister()" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Buat Akun Sekarang</button>
        </div>

        <div style="margin-top: 30px;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">Atau masuk dengan</p>
            <div class="social-login">
                <a href="#" class="social-btn"><i class="fa-brands fa-google"></i></a>
                <a href="#" class="social-btn"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="social-btn"><i class="fa-brands fa-apple"></i></a>
            </div>
        </div>
    </div>

    <script>
        // Pastikan fungsi tersedia secara global
        window.switchTab = function(type) {
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (type === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        };

        window.handleRegister = function() {
            const btn = event.target;
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            
            if(!name || !email || !pass) {
                alert('Peringatan: Semua kolom (Nama, Email, Password) wajib diisi!');
                return;
            }

            if(!email.includes('@') || !email.includes('.')) {
                alert('Peringatan: Format email tidak valid! Gunakan format nama@mail.com');
                return;
            }

            btn.innerText = "Sedang Memproses...";
            btn.disabled = true;

            try {
                // Simpan data
                const userData = { 
                    name: name, 
                    email: email, 
                    role: 'buyer', 
                    pass: pass,
                    createdAt: new Date().toISOString()
                };
                
                // Simpan ke localStorage
                localStorage.setItem('nexmart_user', JSON.stringify(userData));
                localStorage.setItem('isLoggedIn', 'true');
                
                setTimeout(() => {
                    alert('SELAMAT! Akun ' + name + ' berhasil dibuat. Klik OK untuk masuk ke NexMart.');
                    window.location.href = 'index.html';
                }, 800);
            } catch (err) {
                alert('Terjadi kesalahan sistem. Silakan coba lagi.');
                btn.innerText = "Buat Akun Sekarang";
                btn.disabled = false;
            }
        };

        window.handleLogin = function() {
            const btn = event.target;
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const storedUser = JSON.parse(localStorage.getItem('nexmart_user'));

            if (!user || !pass) {
                alert('Peringatan: Masukkan Email dan Kata Sandi Anda!');
                return;
            }

            if (storedUser && (user === storedUser.email || user === storedUser.name) && pass === storedUser.pass) {
                btn.innerText = "Membuka Akun...";
                localStorage.setItem('isLoggedIn', 'true');
                setTimeout(() => {
                    alert('Login Berhasil! Selamat datang kembali.');
                    window.location.href = 'index.html';
                }, 500);
            } else {
                alert('Eror: Email atau kata sandi salah. Silakan cek kembali!');
            }
        };
    </script>
</body>
</html>
