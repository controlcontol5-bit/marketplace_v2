<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk & Daftar | NexMart</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-dark); /* Ensure dark background */
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.2), transparent),
                        radial-gradient(circle at bottom left, rgba(0, 242, 255, 0.1), transparent);
            color: white;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            background: #1e293b; /* Solid Dark Background */
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 5px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 600;
            color: #94a3b8;
        }
        .auth-tab.active {
            background: var(--primary);
            color: #0f172a;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #cbd5e1; /* Lighter label for better visibility */
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }
        .form-group select {
            appearance: none;
            cursor: pointer;
        }
        .social-login {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }
        .social-btn:hover {
            background: var(--primary);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="auth-card glass animate-fade">
        <a href="index.html" class="logo gradient-text" style="font-size: 2.5rem; display: block; margin-bottom: 30px;">NexMart</a>
        
        <div class="auth-tabs">
            <div class="auth-tab active" id="login-tab" onclick="switchTab('login')">Masuk</div>
            <div class="auth-tab" id="register-tab" onclick="switchTab('register')">Daftar</div>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label>Email atau Username</label>
                <input type="text" id="loginUser" placeholder="Masukkan email Anda">
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" style="color: var(--primary); font-size: 0.85rem; text-decoration: none;">Lupa kata sandi?</a>
            </div>
            <button onclick="handleLogin()" class="btn btn-primary" style="width: 100%; justify-content: center;">Masuk Sekarang</button>
        </div>

        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Nama sesuai KTP">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Kata Sandi Baru</label>
                <input type="password" id="regPass" placeholder="Minimal 8 karakter">
            </div>
            <div class="form-group">
                <label>Daftar Sebagai</label>
                <select id="regRole" style="width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; outline: none;">
                    <option value="buyer">Pembeli</option>
                    <option value="seller">Penjual (Gunakan Komisi Rendah)</option>
                </select>
            </div>
            <button onclick="handleRegister()" class="btn btn-primary" style="width: 100%; justify-content: center;">Buat Akun Gratis</button>
        </div>

        <div style="margin-top: 30px;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">Atau masuk dengan</p>
            <div class="social-login">
                <a href="#" class="social-btn"><i class="fa-brands fa-google"></i></a>
                <a href="#" class="social-btn"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="social-btn"><i class="fa-brands fa-apple"></i></a>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            if (type === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        }

        function handleRegister() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const role = document.getElementById('regRole').value;

            if(!name || !email || !pass) {
                alert('Harap isi semua bidang!');
                return;
            }

            const userData = { name, email, role, pass };
            localStorage.setItem('nexmart_user', JSON.stringify(userData));
            
            alert('Pendaftaran berhasil! Selamat datang, ' + name);
            window.location.href = role === 'seller' ? 'seller-dashboard.html' : 'index.html';
        }

        function handleLogin() {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            const storedUser = JSON.parse(localStorage.getItem('nexmart_user'));

            if (storedUser && (user === storedUser.email || user === storedUser.name) && pass === storedUser.pass) {
                alert('Login berhasil! Selamat datang kembali.');
                window.location.href = storedUser.role === 'seller' ? 'seller-dashboard.html' : 'index.html';
            } else {
                alert('Email atau kata sandi salah!');
            }
        }
    </script>
</body>
</html>
